<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的设计作品集 | UI/UX · AI融合 · 视觉视效</title>
<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, "Microsoft YaHei", sans-serif;
}

html {
scroll-behavior: smooth;
}

body {
background: #fafafa;
color: #1a1a1a;
line-height: 1.6;
}

/* 导航栏 */
header {
position: fixed;
top: 0;
left: 0;
width: 100%;
background: rgba(255,255,255,0.85);
backdrop-filter: blur(20px);
padding: 1rem 1.5rem;
z-index: 999;
box-shadow: 0 1px 10px rgba(0,0,0,0.05);
}

.nav-inner {
max-width: 1100px;
margin: 0 auto;
display: flex;
justify-content: space-between;
align-items: center;
}

.logo {
font-size: 1.2rem;
font-weight: 600;
color: #111;
}

.nav-links a {
margin-left: 1.8rem;
text-decoration: none;
color: #333;
font-weight: 400;
font-size: 0.95rem;
transition: 0.2s;
}

.nav-links a:hover {
color: #000;
}
</html>
