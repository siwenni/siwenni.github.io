<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>医疗UI设计作品集</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:system-ui,sans-serif;background:#f0f2f8;color:#1E293B;padding-bottom:80px}
header{position:fixed;top:0;left:0;width:100%;background:rgba(255,255,255,.85);backdrop-filter:blur(12px);z-index:90}
.nav{max-width:1000px;margin:auto;padding:16px;display:flex;justify-content:space-between;align-items:center}
.logo{font-weight:600}
.menu a{margin-left:20px;text-decoration:none;color:#333}

.about{max-width:700px;margin:0 auto;padding:120px 20px 40px;text-align:center}
.about h2{font-size:26px;margin-bottom:16px}
.about p{color:#475569;line-height:1.7}

.category{display:flex;gap:12px;justify-content:center;margin-bottom:36px;flex-wrap:wrap;padding:0 20px}
.cat{padding:10px 18px;border-radius:10px;background:#fff;border:1px solid #e2e8f0;cursor:pointer}
.cat.active{background:#1E293B;color:#fff}

.grid{max-width:1000px;margin:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px;padding:0 20px}
.item{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 12px rgba(0,20,60,.05)}
.thumb-img{width:100%;height:200px;object-fit:cover;display:block}
.info{padding:18px}
.tag{font-size:12px;color:#64748b;margin-bottom:6px}
.title{font-size:16px;font-weight:500}

.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99;padding:20px;align-items:center;justify-content:center}
.modalBox{background:#fff;border-radius:20px;max-width:750px;width:100%;max-height:85vh;overflow-y:auto;padding:24px;position:relative}
.close{position:absolute;right:20px;top:16px;font-size:22px;cursor:pointer}
.modal-img{width:100%;height:auto;border-radius:12px;margin-bottom:12px}

/* 底部版权声明样式 */
.footer{position:fixed;left:0;bottom:0;width:100%;background:#fff;padding:12px 0;text-align:center;font-size:12px;color:#666;border-top:1px solid #eee}
</style>
</head>

<body>

<header>
  <div class="nav">
    <div class="logo">设计作品集</div>
    <div class="menu">
      <a href="#about">关于我</a>
      <a href="#works">作品</a>
    </div>
  </div>
</header>

<section id="about" class="about">
  <h2>医疗设备UI/UX设计</h2>
  <p>专注医疗康复类产品界面设计，追求专业、严谨、易用的用户体验。</p>
</section>

<div class="category" id="works">
  <div class="cat active" data-type="all">全部</div>
  <div class="cat" data-type="ai">AI融合</div>
  <div class="cat" data-type="ui">UI/UX</div>
  <div class="cat" data-type="visual">外观</div>
</div>

<div class="grid">
  <div class="item" data-type="ui" onclick="openModal(1)">
    <img src="sxc1.png" class="thumb-img" loading="lazy">
    <div class="info">
      <div class="tag">UI/UX 医疗设备</div>
      <div class="title">脉冲磁场治疗仪</div>
    </div>
  </div>

  <div class="item" data-type="ui" onclick="openModal(2)">
    <img src="JLD1.png" class="thumb-img" loading="lazy">
    <div class="info">
      <div class="tag">UI/UX 医疗设备</div>
      <div class="title">经颅电刺激仪</div>
    </div>
  </div>
</div>

<div class="modal" id="modal1">
  <div class="modalBox">
    <div class="close" onclick="closeModal(1)">×</div>
    <img src="sxc1.png" loading="lazy">
    <img src="sxc2.png" loading="lazy">
  </div>
</div>

<div class="modal" id="modal2">
  <div class="modalBox">
    <div class="close" onclick="closeModal(2)">×</div>
    <img src="JLD1.png" loading="lazy">
    <img src="JLD2.png" loading="lazy">
    <img src="JLD3.png" loading="lazy">
  </div>
</div>

<!-- 底部防盗版声明 -->
<div class="footer">
  © 2026 倪思雯原创医疗UI设计作品 · 禁止私自保存、盗用、商用及AI训练使用
</div>

<script>
function openModal(n){document.getElementById('modal'+n).style.display='flex'}
function closeModal(n){document.getElementById('modal'+n).style.display='none'}

const cats=document.querySelectorAll('.cat');
const items=document.querySelectorAll('.item');
cats.forEach(c=>{
  c.addEventListener('click',()=>{
    cats.forEach(x=>x.classList.remove('active'));
    c.classList.add('active');
    let t=c.dataset.type;
    items.forEach(i=>{
      if(t==='all'||i.dataset.type===t) i.style.display='block';
      else i.style.display='none';
    })
  })
})
</script>

</body>
</html>
